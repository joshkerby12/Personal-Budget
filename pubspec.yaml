name: personal_budget
description: "Personal Budget App — family budget tracker with personal and business finance tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.9.0

  # Routing
  go_router: ^14.6.3

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Env / secrets
  flutter_dotenv: ^5.2.1

  # Utils
  intl: ^0.19.0
  fl_chart: ^0.69.0
  uuid: ^4.5.1
  file_picker: ^8.0.0
  csv: ^6.0.0
  mime: ^1.0.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/prompts/

  # fonts: system fonts only — no custom fonts
